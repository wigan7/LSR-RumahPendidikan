<!doctype html>
<html lang="id">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Petualang Cilik Tata Suryaku</title>
  <link rel="stylesheet" href="./styles.css">
 </head>
 <body>
  <div class="game-container">
   <div class="game-content">
      <canvas id="gameCanvas" width="960" height="540"></canvas>
       
       <!-- UI Layer -->
       <div id="ui-layer">
         
         <!-- MAIN MENU -->
         <div id="main-menu">
           <h1 class="text-5xl font-bold text-yellow-400 mb-4 menu-title">PETUALANG CILIK TATA SURYAKU</h1>
           
           <div class="glass-panel">
             <div class="menu-left">
                 <div class="input-group">
                   <label>NAMA PETUALANG:</label>
                   <input type="text" id="player-name" placeholder="Ketik namamu..." maxlength="15">
                 </div>
                 <div class="input-group">
                   <label>TINGKAT KESULITAN:</label>
                   <select id="difficulty-select">
                     <option value="mudah">Mudah</option>
                     <option value="sedang" selected>Sedang</option>
                     <option value="sulit">Sulit</option>
                   </select>
                 </div>
                 <button class="start-btn mt-2" onclick="submitMainMenu()">MULAI MISI</button>
                 <button class="roadmap-btn mp-mode-btn" onclick="openMultiplayerMenu()">MODE MULTIPLAYER</button>
                 <button class="roadmap-btn" onclick="showMenuRoadmap()">PETA MISI</button>
                 <button class="roadmap-btn minigame-mode-btn" onclick="openMinigameTestMenu()">MODE MINIGAME (TEST)</button>
             </div>
             
             <div class="menu-right">
               <label class="menu-character-label">KARAKTER:</label>
                 <div class="char-preview-box">
                    <img id="current-char-img" src="./assets/images/char-select-male.png">
                 </div>
                 <button class="change-btn" onclick="openCharSelect()">Ganti</button>
             </div>

             <div id="minigame-test-menu" class="minigame-test-menu">
               <h3>MODE MINIGAME TEST</h3>
               <p>Pilih planet tujuan untuk menguji variasi minigame.</p>
               <div class="input-group">
                 <label>PLANET UJI:</label>
                 <select id="test-planet-select"></select>
               </div>
               <div class="minigame-test-actions">
                 <button class="roadmap-btn" onclick="closeMinigameTestMenu()">Batal</button>
                 <button class="start-btn" onclick="startMinigameTestMode()">Mulai Test</button>
               </div>
             </div>
           </div>
         </div>

         <!-- MULTIPLAYER SETUP MENU -->
         <div id="multiplayer-menu">
          <button class="back-btn" onclick="closeMultiplayerMenu()">KEMBALI</button>
          <h2 class="text-4xl font-bold text-yellow-400 mb-4 menu-heading">MULTIPLAYER SPLIT SCREEN</h2>
          <div class="multiplayer-panel">
            <div class="mp-side">
              <h3 class="mp-title astronaut">PLAYER 1 - ASTRONOT</h3>
              <div class="input-group">
                <label>NAMA PLAYER 1:</label>
                <input type="text" id="mp-p1-name" placeholder="Nama Astronot" maxlength="15">
              </div>
              <div class="mp-char-row">
                <button id="mp-p1-male" class="mp-char-btn mp-char-card active" onclick="chooseMpP1Character('male')">
                  <img src="./assets/images/char-select-male.png" alt="Astronot Laki-laki">
                  <span class="mp-char-label">Astronot Laki-laki</span>
                </button>
                <button id="mp-p1-female" class="mp-char-btn mp-char-card" onclick="chooseMpP1Character('female')">
                  <img src="./assets/images/char-select-female.png" alt="Astronot Perempuan">
                  <span class="mp-char-label">Astronot Perempuan</span>
                </button>
              </div>
            </div>
            <div class="mp-side">
              <h3 class="mp-title alien">PLAYER 2 - ALIEN</h3>
              <div class="input-group">
                <label>NAMA PLAYER 2:</label>
                <input type="text" id="mp-p2-name" placeholder="Nama Alien" maxlength="15">
              </div>
              <div class="mp-alien-picker">
                <button id="mp-a1" class="mp-alien-card active" onclick="chooseMpP2Alien(0)"><img src="./assets/images/alien-1.png" alt="Alien 1"></button>
                <button id="mp-a2" class="mp-alien-card" onclick="chooseMpP2Alien(1)"><img src="./assets/images/alien-2.png" alt="Alien 2"></button>
                <button id="mp-a3" class="mp-alien-card" onclick="chooseMpP2Alien(2)"><img src="./assets/images/alien3.png" alt="Alien 3"></button>
              </div>
            </div>
          </div>
          <div class="mp-actions">
            <button class="start-btn" onclick="startMultiplayerGame()">MULAI PERTARUNGAN</button>
          </div>
         </div>

         <!-- CHARACTER SELECTION SCREEN -->
         <div id="char-select-menu">
            <button class="back-btn" onclick="closeCharSelect()">KEMBALI</button>
            <h2 class="text-4xl font-bold text-white mb-2 menu-heading">PILIH KARAKTER PETUALANG</h2>
            <p class="text-yellow-400 font-bold text-lg menu-subheading">Siapa yang akan memimpin misi ini?</p>
            <div class="char-cards-wrapper">
                <div class="char-card male" onclick="chooseCharacter('male')">
                    <img src="./assets/images/char-select-male.png">
                    <div class="label">PETUALANG BOY</div>
                </div>
                <div class="char-card female" onclick="chooseCharacter('female')">
                    <img src="./assets/images/char-select-female.png">
                    <div class="label">PETUALANG GIRL</div>
                </div>
            </div>
         </div>
       </div>

       <div id="in-game-notification" aria-live="polite"></div>

       <!-- TOMBOL AUDIO -->
      <div id="audio-controls" aria-label="Kontrol audio">
        <button id="audio-menu-btn" onclick="toggleAudioPopup()" title="Buka pengaturan audio" aria-label="Buka pengaturan audio">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M3 9h4l5-4v14l-5-4H3z"></path>
            <path d="M15 9c1.7 1.2 1.7 4.8 0 6" fill="none" stroke-width="2" stroke-linecap="round"></path>
            <path d="M18 7c3 2.2 3 7.8 0 10" fill="none" stroke-width="2" stroke-linecap="round"></path>
          </svg>
        </button>
        <div id="audio-popup" aria-label="Pilihan audio">
          <button id="music-toggle-btn" onclick="toggleMusic()" title="Matikan musik latar" aria-label="Toggle musik latar">
            <span class="note-icon" aria-hidden="true">♪</span>
          </button>
          <button id="sfx-toggle-btn" onclick="toggleSfx()" title="Matikan sound effect" aria-label="Toggle sound effect">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M3 9h4l5-4v14l-5-4H3z"></path>
              <path d="M15.5 10.5l5 5" fill="none" stroke-width="2" stroke-linecap="round"></path>
              <path d="M20.5 10.5l-5 5" fill="none" stroke-width="2" stroke-linecap="round"></path>
            </svg>
          </button>
        </div>
      </div>
   </div>
  </div>

  <script src="./app.js"></script>
 </body>
</html>
